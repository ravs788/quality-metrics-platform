name: Reusable Pytest Runner

on:
  workflow_call:
    inputs:
      python-version:
        required: false
        type: string
        default: "3.12"
      marker-expression:
        required: true
        type: string
      setup-postgres:
        required: false
        type: boolean
        default: false

jobs:
  pytest:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: mysecretpassword
          POSTGRES_DB: mydb
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ inputs.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Prepare integration/e2e PostgreSQL databases
        if: ${{ inputs.setup-postgres }}
        env:
          PGPASSWORD: mysecretpassword
        run: |
          psql -h localhost -U postgres -d postgres -c "CREATE DATABASE quality_metrics_integration_test;"
          psql -h localhost -U postgres -d postgres -c "CREATE DATABASE quality_metrics_e2e_test;"
          psql -h localhost -U postgres -d quality_metrics_integration_test -f database/schema.sql
          psql -h localhost -U postgres -d quality_metrics_e2e_test -f database/schema.sql

      - name: Run pytest by marker group
        env:
          DATABASE_URL: "sqlite:///:memory:"
          INTEGRATION_DATABASE_URL: "postgresql://postgres:mysecretpassword@localhost:5432/quality_metrics_integration_test"
          E2E_DATABASE_URL: "postgresql://postgres:mysecretpassword@localhost:5432/quality_metrics_e2e_test"
        run: |
          pytest -m "${{ inputs.marker-expression }}" -v
