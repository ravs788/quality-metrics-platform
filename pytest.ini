[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
asyncio_mode = auto
addopts = 
    -v
    --tb=short
    --strict-markers
    # Temporarily disabled for testing without pytest-cov
    # --cov=src
    # --cov-report=term-missing
    # --cov-report=html:coverage_html
    # --cov-report=xml:coverage.xml
    # --cov-report=json:coverage.json
markers =
    unit: Unit tests
    component: Component/API-slice tests
    integration: Integration tests
    e2e: End-to-end tests
